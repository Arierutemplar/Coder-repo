    <script>
        const sonidoHover = new Audio('audio/hover-suave.mp3');
        sonidoHover.volume = 0.2; 

        const elementosInteractivos = document.querySelectorAll('.main-nav a, .footer-social a, .glass-btn');

        elementosInteractivos.forEach(elemento => {
            elemento.addEventListener('mouseenter', () => {

            });
